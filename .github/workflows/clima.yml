name: Teste Clima Agendado

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  rodar-script:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rodar script de clima
        run: python clima_horario.py

      - name: Publicar resultado (commit aut
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza pagina de clima"
          file_pattern: "docs/index.html his

      - name: Preparar Pages
        uses: actions/configure-pages@v5

      - name: Empacotar site
        uses: actions/upload-pages-artifact@
        with:
          path: docs

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
